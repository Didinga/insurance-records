services:
  web:
    build: .
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_DB_PATH: /app/data/db.sqlite3

volumes:
  sqlite_data: